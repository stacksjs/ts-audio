name: CI

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2.0.2

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install Dependencies
        run: bun install

      - name: Publish to npm
        run: pantry publish --npm --access public './packages/*' '.'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        run: bunx changelogithub
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Attach Binaries
        uses: stacksjs/action-releaser@v1.2.9
        with:
          files: |
            bin/audiox-linux-x64.zip
            bin/audiox-linux-arm64.zip
            bin/audiox-windows-x64.zip
            bin/audiox-darwin-x64.zip
            bin/audiox-darwin-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
